<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>房源权限配置</title>
  <style>
    :root { --primary:#1677ff; --danger:#ff4d4f; --ok:#52c41a; --border:#e5e7eb; --bg:#f5f7fb; --text:#111827; --muted:#6b7280; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:960px; margin:24px auto; padding:0 16px; }
    .card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; }
    .title { font-size:18px; font-weight:700; margin:0 0 8px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .row > * { flex:1 1 180px; }
    input, select, button { height:36px; border-radius:8px; border:1px solid var(--border); padding:0 10px; font-size:14px; }
    button { cursor:pointer; background:#fff; }
    .btn-primary { background:var(--primary); color:#fff; border-color:var(--primary); }
    .btn-danger { background:#fff1f0; color:var(--danger); border-color:#ffccc7; }
    .hint { color:var(--muted); font-size:12px; margin-top:8px; }
    .status { font-size:13px; margin-top:6px; min-height:18px; }
    .ok { color:var(--ok); }
    .err { color:var(--danger); }
    table { width:100%; border-collapse:collapse; font-size:14px; margin-top:8px; }
    th, td { border-bottom:1px solid var(--border); text-align:left; padding:10px 6px; }
    th { color:var(--muted); font-weight:600; font-size:12px; }
    .code { background:#f3f4f6; border-radius:4px; padding:1px 6px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">房源权限配置</h1>
      <div class="hint">用于配置 <span class="code">house_assignments</span>。H5 打卡权限校验读取这里的数据。</div>
      <div id="auth-status" class="status">登录中...</div>
    </div>

    <div class="card">
      <h2 class="title" style="font-size:16px;">新增分配</h2>
      <div class="row">
        <input id="houseId" placeholder="houseId，例如 house_004" />
        <input id="userId" placeholder="userId，例如 user_001（可空）" />
        <input id="departmentId" placeholder="departmentId（可空）" />
        <select id="role">
          <option value="">角色（可空）</option>
          <option value="ACCOUNT_MANAGER">ACCOUNT_MANAGER</option>
          <option value="AGENT">AGENT</option>
          <option value="HOUSE_MANAGER">HOUSE_MANAGER</option>
          <option value="ASSET_MANAGER">ASSET_MANAGER</option>
          <option value="ADMIN">ADMIN</option>
        </select>
        <input id="validFrom" type="date" />
        <input id="validTo" type="date" />
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="btn-primary" onclick="createAssignment()">创建分配</button>
      </div>
      <div class="hint">规则：<span class="code">userId</span> 和 <span class="code">departmentId</span> 至少填一个，生效区间由 validFrom/validTo 控制。</div>
    </div>

    <div class="card">
      <h2 class="title" style="font-size:16px;">查询与撤销</h2>
      <div class="row">
        <input id="queryHouseId" placeholder="输入 houseId 查询，例如 house_004" />
        <button onclick="loadAssignments()">查询分配</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>houseId</th>
            <th>userId</th>
            <th>departmentId</th>
            <th>role</th>
            <th>有效期</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="8" style="color:var(--muted);">请输入 houseId 后查询</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const AUTH_STORAGE_KEY = 'nfc_admin_jwt';
    let token = null;

    function setStatus(msg, ok = true) {
      const el = document.getElementById('auth-status');
      el.textContent = msg;
      el.className = 'status ' + (ok ? 'ok' : 'err');
    }

    async function ensureAuth() {
      const existing = sessionStorage.getItem(AUTH_STORAGE_KEY);
      if (existing) { token = existing; setStatus('已使用现有管理员会话'); return; }
      const modeRes = await fetch(`${API_BASE}/auth/mode`);
      const modeData = await modeRes.json().catch(() => ({}));
      if (modeData.mode !== 'mock') {
        setStatus('当前不是 mock 模式，请先手动登录管理员后再进入此页', false);
        return;
      }
      const res = await fetch(`${API_BASE}/auth/mock/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'admin@demo.com', password: 'admin123' }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.token) {
        setStatus('管理员登录失败：' + (data.message || res.status), false);
        return;
      }
      token = data.token;
      sessionStorage.setItem(AUTH_STORAGE_KEY, token);
      setStatus(`已登录管理员：${data.user?.name || data.user?.email || 'admin'}`);
    }

    async function apiFetch(path, options = {}) {
      const headers = new Headers(options.headers || {});
      if (token) headers.set('Authorization', 'Bearer ' + token);
      return fetch(`${API_BASE}${path}`, { ...options, headers });
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    async function createAssignment() {
      const houseId = document.getElementById('houseId').value.trim();
      const userId = document.getElementById('userId').value.trim();
      const departmentId = document.getElementById('departmentId').value.trim();
      const role = document.getElementById('role').value;
      const validFrom = document.getElementById('validFrom').value || today();
      const validTo = document.getElementById('validTo').value || undefined;
      if (!houseId) return alert('houseId 不能为空');
      if (!userId && !departmentId) return alert('userId 和 departmentId 至少填一个');
      const body = { houseId, userId: userId || undefined, departmentId: departmentId || undefined, role: role || undefined, validFrom, validTo };
      const res = await apiFetch('/houses/assignments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return alert('创建失败：' + (data.message || data.error || res.status));
      alert('创建成功');
      document.getElementById('queryHouseId').value = houseId;
      loadAssignments();
    }

    async function loadAssignments() {
      const houseId = document.getElementById('queryHouseId').value.trim();
      if (!houseId) return alert('请输入 houseId');
      const res = await apiFetch(`/houses/${encodeURIComponent(houseId)}/assignments`);
      const data = await res.json().catch(() => []);
      const tbody = document.getElementById('rows');
      if (!res.ok) {
        tbody.innerHTML = `<tr><td colspan="8" style="color:var(--danger);">查询失败：${data.message || data.error || res.status}</td></tr>`;
        return;
      }
      if (!Array.isArray(data) || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="color:var(--muted);">暂无分配记录</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(r => `
        <tr>
          <td><span class="code">${r.id}</span></td>
          <td>${r.houseId || '-'}</td>
          <td>${r.userId || '-'}</td>
          <td>${r.departmentId || '-'}</td>
          <td>${r.role || '-'}</td>
          <td>${r.validFrom || '-'} ~ ${r.validTo || '长期'}</td>
          <td>${r.isActive ? '有效' : '已撤销'}</td>
          <td><button class="btn-danger" onclick="revoke('${r.id}')">撤销</button></td>
        </tr>
      `).join('');
    }

    async function revoke(id) {
      if (!confirm('确认撤销该分配？')) return;
      const res = await apiFetch(`/houses/assignments/${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        return alert('撤销失败：' + (data.message || data.error || res.status));
      }
      alert('已撤销');
      loadAssignments();
    }

    (async function init() {
      document.getElementById('validFrom').value = today();
      await ensureAuth();
    })();
  </script>
</body>
</html>
