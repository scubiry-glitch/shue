<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFC 写卡工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1677FF; --success: #52C41A; --warning: #FAAD14; --danger: #F5222D; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #F0F2F5; color: #262626; font-size: 14px; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .btn { padding: 14px 24px; border-radius: 10px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; }
        .badge-success { background: #f6ffed; color: var(--success); }
        .badge-warning { background: #fffbe6; color: #d48806; }
        .badge-danger { background: #fff2f0; color: var(--danger); }
        .badge-info { background: #e6f4ff; color: var(--primary); }
        .house-item { display: flex; align-items: center; padding: 14px; border: 2px solid #f0f0f0; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .house-item:hover { border-color: #bae0ff; }
        .house-item.selected { border-color: var(--primary); background: #e6f4ff; }
        .house-item.bound { border-color: var(--success); background: #f6ffed; }
        .nfc-area { width: 180px; height: 180px; border-radius: 50%; border: 3px dashed #d9d9d9; display: flex; align-items: center; justify-content: center; margin: 20px auto; transition: all 0.3s; }
        .nfc-area.ready { border-color: var(--primary); border-style: solid; animation: pulse 2s infinite; }
        .nfc-area.writing { border-color: var(--warning); border-style: solid; }
        .nfc-area.success { border-color: var(--success); border-style: solid; background: #f6ffed; }
        .nfc-area.error { border-color: var(--danger); border-style: solid; background: #fff2f0; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(22,119,255,0.3); } 50% { box-shadow: 0 0 0 12px rgba(22,119,255,0); } }
        .log-box { background: #1a1a2e; color: #a0ffa0; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 180px; overflow-y: auto; line-height: 1.8; }
        .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; margin-right: 10px; flex-shrink: 0; }
        .step-num.done { background: var(--success); }
        .search-input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

<div style="background:var(--primary);color:#fff;padding:16px;">
    <div class="container" style="display:flex;align-items:center;padding:0;">
        <a href="/admin/" style="color:#fff;text-decoration:none;margin-right:12px;"><i class="fas fa-arrow-left"></i></a>
        <div>
            <div style="font-size:17px;font-weight:700;">NFC 写卡工具</div>
            <div style="font-size:12px;opacity:0.75;">单房源写入 · Web NFC · Chrome Android</div>
        </div>
    </div>
</div>

<div class="container" style="padding-top:12px;padding-bottom:40px;">

    <!-- 不支持提示 -->
    <div id="unsupported" style="display:none;">
        <div class="card" style="text-align:center;border:1px solid #ffccc7;">
            <i class="fas fa-exclamation-triangle" style="font-size:32px;color:var(--danger);margin-bottom:8px;"></i>
            <div style="font-weight:600;">当前浏览器不支持 Web NFC</div>
            <div style="font-size:13px;color:#8C8C8C;margin-top:6px;">请使用 <b>Android Chrome 89+</b> 打开此页面</div>
        </div>
    </div>

    <div id="main-ui">

    <!-- Step 1: 选择房源 -->
    <div class="card" id="step1">
        <div style="display:flex;align-items:center;margin-bottom:14px;">
            <span class="step-num" id="step1-num">1</span>
            <span style="font-size:15px;font-weight:600;">选择房源</span>
        </div>
        <div style="position:relative;margin-bottom:12px;">
            <i class="fas fa-search" style="position:absolute;left:12px;top:11px;color:#8C8C8C;"></i>
            <input type="text" id="house-search" class="search-input" placeholder="搜索房源名称或地址..." oninput="filterHouses()">
        </div>
        <div id="house-list" style="max-height:320px;overflow-y:auto;">
            <div style="text-align:center;color:#8C8C8C;padding:20px;">加载中...</div>
        </div>
    </div>

    <!-- Step 2: 确认写入信息 -->
    <div class="card" id="step2" style="display:none;">
        <div style="display:flex;align-items:center;margin-bottom:14px;">
            <span class="step-num" id="step2-num">2</span>
            <span style="font-size:15px;font-weight:600;">确认写入信息</span>
        </div>
        <div style="background:#f9fafb;border-radius:8px;padding:14px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                <span style="color:#8C8C8C;">房源</span>
                <span style="font-weight:600;" id="info-house"></span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                <span style="color:#8C8C8C;">tag_id</span>
                <span style="font-family:monospace;font-size:13px;" id="info-tagid"></span>
            </div>
            <div style="margin-top:10px;">
                <span style="color:#8C8C8C;font-size:12px;">写入 URL:</span>
                <div style="background:#fff;border:1px solid #d9d9d9;border-radius:6px;padding:8px 10px;margin-top:4px;font-family:monospace;font-size:12px;word-break:break-all;color:var(--primary);" id="info-url"></div>
            </div>
        </div>
        <div style="margin-top:12px;">
            <button class="btn btn-primary" id="btn-write" onclick="startWrite()">
                <i class="fas fa-wifi" style="margin-right:8px;"></i>开始写入 NFC 白卡
            </button>
        </div>
    </div>

    <!-- Step 3: NFC 写入 -->
    <div class="card" id="step3" style="display:none;">
        <div style="display:flex;align-items:center;margin-bottom:14px;">
            <span class="step-num" id="step3-num">3</span>
            <span style="font-size:15px;font-weight:600;">NFC 写入</span>
        </div>
        <div class="nfc-area" id="nfc-area">
            <div style="text-align:center;" id="nfc-inner">
                <i class="fas fa-mobile-alt" style="font-size:36px;color:var(--primary);"></i>
                <div style="font-size:13px;color:#8C8C8C;margin-top:8px;">请将白卡<br>贴近手机背面</div>
            </div>
        </div>
        <div style="text-align:center;font-size:14px;font-weight:600;min-height:24px;margin-bottom:8px;" id="write-status"></div>
        <div style="display:flex;gap:8px;">
            <button class="btn btn-outline" style="font-size:14px;" onclick="retryWrite()">
                <i class="fas fa-redo" style="margin-right:4px;"></i>重试
            </button>
            <button class="btn btn-outline" style="font-size:14px;" onclick="resetAll()">
                <i class="fas fa-times" style="margin-right:4px;"></i>取消
            </button>
        </div>
    </div>

    <!-- Step 4: 完成 + 绑定 -->
    <div class="card" id="step4" style="display:none;">
        <div style="text-align:center;margin-bottom:16px;">
            <i class="fas fa-check-circle" style="font-size:48px;color:var(--success);"></i>
            <div style="font-size:18px;font-weight:700;margin-top:10px;">写卡成功并已绑定</div>
        </div>
        <div style="background:#f6ffed;border-radius:8px;padding:14px;font-size:13px;">
            <div style="margin-bottom:6px;"><b>房源:</b> <span id="done-house"></span></div>
            <div style="margin-bottom:6px;"><b>tag_id:</b> <span id="done-tagid" style="font-family:monospace;"></span></div>
            <div style="word-break:break-all;"><b>URL:</b> <span id="done-url" style="font-family:monospace;color:var(--primary);"></span></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px;">
            <button class="btn btn-primary" style="font-size:14px;" onclick="resetAll()">
                <i class="fas fa-plus" style="margin-right:4px;"></i>写下一张
            </button>
        </div>
    </div>

    <!-- 日志 -->
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:13px;font-weight:600;">操作日志</span>
            <span style="font-size:12px;color:var(--primary);cursor:pointer;" onclick="exportLog()"><i class="fas fa-download"></i> 导出</span>
        </div>
        <div class="log-box" id="log-box"><div style="color:#666;">等待操作...</div></div>
    </div>

    </div><!-- /main-ui -->
</div>

<script>
const API_BASE = window.location.origin;

let houses = [];
let selectedHouse = null;
let nfcConfig = { nfcDomain: 'nfc.meizu.life', urlTemplate: '' };
let writeUrl = '';
let tagId = '';
let logs = [];

// ===== 初始化 =====
async function init() {
    if (!('NDEFReader' in window)) {
        document.getElementById('unsupported').style.display = 'block';
        document.getElementById('main-ui').style.opacity = '0.3';
        document.getElementById('main-ui').style.pointerEvents = 'none';
    }
    await loadConfig();
    await loadHouses();
}

async function loadConfig() {
    try {
        const res = await fetch(`${API_BASE}/config/nfc`);
        nfcConfig = await res.json();
        addLog(`域名: ${nfcConfig.nfcDomain}`);
        addLog(`URL模板: ${nfcConfig.urlTemplate}`);
    } catch(e) {
        nfcConfig = { nfcDomain: 'nfc.meizu.life', urlTemplate: 'https://nfc.meizu.life/h5/#checkin?tag={tag_id}' };
        addLog(`⚠ 配置加载失败，使用默认域名: ${nfcConfig.nfcDomain}`);
    }
}

// ===== Step 1: 加载房源列表 =====
async function loadHouses() {
    try {
        const res = await fetch(`${API_BASE}/attendance/nfc-tags/houses`);
        houses = await res.json();
        renderHouses(houses);
        addLog(`加载 ${houses.length} 个房源`);
    } catch(e) {
        document.getElementById('house-list').innerHTML = '<div style="text-align:center;color:var(--danger);padding:20px;">加载失败</div>';
        addLog(`✗ 房源加载失败: ${e.message}`);
    }
}

function filterHouses() {
    const keyword = document.getElementById('house-search').value.trim().toLowerCase();
    const filtered = keyword ? houses.filter(h => h.name.toLowerCase().includes(keyword) || h.address.toLowerCase().includes(keyword)) : houses;
    renderHouses(filtered);
}

function renderHouses(list) {
    const container = document.getElementById('house-list');
    if (!list.length) {
        container.innerHTML = '<div style="text-align:center;color:#8C8C8C;padding:20px;">无匹配房源</div>';
        return;
    }
    container.innerHTML = list.map(h => `
        <div class="house-item ${selectedHouse?.houseId === h.houseId ? 'selected' : ''} ${h.bound ? 'bound' : ''}"
             onclick="selectHouse('${h.houseId}')">
            <div style="flex:1;min-width:0;">
                <div style="font-weight:600;display:flex;align-items:center;gap:6px;">
                    ${h.name}
                    ${h.bound ? '<span class="badge badge-success">已绑定</span>' : '<span class="badge badge-warning">未绑定</span>'}
                </div>
                <div style="font-size:12px;color:#8C8C8C;margin-top:2px;">${h.address}</div>
                ${h.bound ? `<div style="font-size:11px;color:var(--success);margin-top:2px;font-family:monospace;">tag: ${h.boundTagId}</div>` : ''}
            </div>
            <i class="fas fa-chevron-right" style="color:#d9d9d9;"></i>
        </div>
    `).join('');
}

function selectHouse(houseId) {
    selectedHouse = houses.find(h => h.houseId === houseId);
    if (!selectedHouse) return;

    // 生成 tag_id
    tagId = `${selectedHouse.houseId}_shanghai`;
    writeUrl = nfcConfig.urlTemplate.replace('{tag_id}', tagId);

    // 高亮选中
    renderHouses(houses.filter(h => {
        const keyword = document.getElementById('house-search').value.trim().toLowerCase();
        return !keyword || h.name.toLowerCase().includes(keyword) || h.address.toLowerCase().includes(keyword);
    }));

    // 显示 Step 2
    document.getElementById('step2').style.display = 'block';
    document.getElementById('info-house').textContent = selectedHouse.name;
    document.getElementById('info-tagid').textContent = tagId;
    document.getElementById('info-url').textContent = writeUrl;
    document.getElementById('step1-num').classList.add('done');
    document.getElementById('step1-num').textContent = '✓';

    // 隐藏 step3/4
    document.getElementById('step3').style.display = 'none';
    document.getElementById('step4').style.display = 'none';

    addLog(`选中: ${selectedHouse.name} (${tagId})`);
    addLog(`URL: ${writeUrl}`);

    // 滚动到 step2
    document.getElementById('step2').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ===== Step 3: NFC 写入 =====
async function startWrite() {
    document.getElementById('step2').querySelector('button').disabled = true;
    document.getElementById('step3').style.display = 'block';
    document.getElementById('step2-num').classList.add('done');
    document.getElementById('step2-num').textContent = '✓';

    const nfcArea = document.getElementById('nfc-area');
    const statusEl = document.getElementById('write-status');

    nfcArea.className = 'nfc-area ready';
    statusEl.innerHTML = '<span style="color:var(--primary);">等待NFC感应...</span>';
    addLog('等待白卡贴近...');

    document.getElementById('step3').scrollIntoView({ behavior: 'smooth', block: 'center' });

    try {
        const ndef = new NDEFReader();

        // 写入 NDEF URI
        nfcArea.className = 'nfc-area writing';
        statusEl.innerHTML = '<span style="color:var(--warning);">正在写入...</span>';

        await ndef.write({
            records: [{ recordType: "url", data: writeUrl }]
        });

        // 写入成功
        nfcArea.className = 'nfc-area success';
        document.getElementById('nfc-inner').innerHTML = '<i class="fas fa-check" style="font-size:48px;color:var(--success);"></i><div style="font-size:14px;color:var(--success);margin-top:8px;font-weight:600;">写入成功!</div>';
        statusEl.innerHTML = '<span style="color:var(--success);">✓ NFC写入成功，正在绑定到服务器...</span>';
        addLog(`✓ NFC写入成功: ${writeUrl}`);

        // 绑定到服务器
        await bindToServer();

    } catch(e) {
        nfcArea.className = 'nfc-area error';
        document.getElementById('nfc-inner').innerHTML = '<i class="fas fa-times" style="font-size:48px;color:var(--danger);"></i><div style="font-size:14px;color:var(--danger);margin-top:8px;">写入失败</div>';
        statusEl.innerHTML = `<span style="color:var(--danger);">✗ ${e.message}</span>`;
        addLog(`✗ NFC写入失败: ${e.message}`);
    }
}

// ===== 绑定到服务器 =====
async function bindToServer() {
    try {
        const res = await fetch(`${API_BASE}/attendance/nfc-tags/bind`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                tagId: tagId,
                houseId: selectedHouse.houseId,
                houseName: selectedHouse.name,
                address: selectedHouse.address,
                lat: selectedHouse.lat,
                lng: selectedHouse.lng,
                url: writeUrl,
            })
        });
        const data = await res.json();
        addLog(`✓ 服务器绑定成功: ${tagId} → ${selectedHouse.name}`);

        // 显示完成
        document.getElementById('step3').style.display = 'none';
        document.getElementById('step4').style.display = 'block';
        document.getElementById('step3-num').classList.add('done');
        document.getElementById('step3-num').textContent = '✓';
        document.getElementById('done-house').textContent = selectedHouse.name;
        document.getElementById('done-tagid').textContent = tagId;
        document.getElementById('done-url').textContent = writeUrl;

        // 刷新房源列表
        await loadHouses();

    } catch(e) {
        addLog(`⚠ 服务器绑定失败: ${e.message}（NFC已写入，请手动在后台绑定）`);
        document.getElementById('write-status').innerHTML = `<span style="color:var(--warning);">⚠ NFC已写入但服务器绑定失败，请重试或手动绑定</span>`;
    }
}

function retryWrite() {
    document.getElementById('nfc-area').className = 'nfc-area';
    document.getElementById('nfc-inner').innerHTML = '<i class="fas fa-mobile-alt" style="font-size:36px;color:var(--primary);"></i><div style="font-size:13px;color:#8C8C8C;margin-top:8px;">请将白卡<br>贴近手机背面</div>';
    document.getElementById('write-status').textContent = '';
    addLog('重试写入...');
    startWrite();
}

// ===== 重置 =====
function resetAll() {
    selectedHouse = null;
    writeUrl = '';
    tagId = '';

    document.getElementById('step1-num').className = 'step-num'; document.getElementById('step1-num').textContent = '1';
    document.getElementById('step2-num').className = 'step-num'; document.getElementById('step2-num').textContent = '2';
    document.getElementById('step3-num').className = 'step-num'; document.getElementById('step3-num').textContent = '3';

    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'none';
    document.getElementById('step4').style.display = 'none';
    document.getElementById('step2').querySelector('button').disabled = false;

    document.getElementById('nfc-area').className = 'nfc-area';
    document.getElementById('nfc-inner').innerHTML = '<i class="fas fa-mobile-alt" style="font-size:36px;color:var(--primary);"></i><div style="font-size:13px;color:#8C8C8C;margin-top:8px;">请将白卡<br>贴近手机背面</div>';

    document.getElementById('house-search').value = '';
    renderHouses(houses);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 日志 =====
function addLog(msg) {
    const ts = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    logs.push(`[${ts}] ${msg}`);
    const box = document.getElementById('log-box');
    const color = msg.includes('✓') ? '#a0ffa0' : msg.includes('✗') ? '#ffa0a0' : msg.includes('⚠') ? '#ffd700' : '#ccc';
    box.innerHTML += `<div style="color:${color};">[${ts}] ${msg.replace(/</g,'&lt;')}</div>`;
    box.scrollTop = box.scrollHeight;
}

function exportLog() {
    const blob = new Blob([logs.join('\n')], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `nfc-write-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
}

// ===== 启动 =====
init();
</script>
</body>
</html>
